name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Run tests
        run: npm test -- --coverage --watchAll=false --testTimeout=10000 --testPathIgnorePatterns='LoginForm.test.tsx|App.test.tsx'
        env:
          CI: true
      
      - name: Build frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: https://ahp-django-backend.onrender.com
          DISABLE_ESLINT_PLUGIN: true