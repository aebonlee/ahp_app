services:
  - type: web
    name: ahp-django-backend
    runtime: python
    buildCommand: "cd backend-django && pip install --upgrade pip && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input && python manage.py shell -c \"from django.contrib.auth.models import User; User.objects.create_superuser('admin', 'admin@ahp-platform.com', 'ahp2025admin') if not User.objects.filter(username='admin').exists() else None\""
    startCommand: "cd backend-django && gunicorn ahp_backend.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: "django-insecure-simple-deploy-key-for-success"
    healthCheckPath: /health/