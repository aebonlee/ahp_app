<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHP Platform - 계층적 의사결정 분석 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .landing-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 3rem;
            max-width: 600px;
            text-align: center;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #dee2e6;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        
        .features {
            margin-top: 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .feature {
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .feature h3 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .feature p {
            color: #666;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .landing-container {
                margin: 1rem;
                padding: 2rem;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo">AHP</div>
        <h1>계층적 의사결정 분석 플랫폼</h1>
        <p class="subtitle">
            복잡한 의사결정을 체계적으로 분석하고 최적의 선택을 도출하는 전문 도구
        </p>
        
        <div class="buttons">
            <a href="public/login.html" class="btn btn-primary">
                🔐 로그인
            </a>
            <a href="public/register.html" class="btn btn-secondary">
                📝 회원가입
            </a>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <h3>체계적 분석</h3>
                <p>계층구조 기반 의사결정</p>
            </div>
            <div class="feature">
                <div class="feature-icon">⚖️</div>
                <h3>쌍대비교</h3>
                <p>정확한 가중치 산정</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📈</div>
                <h3>결과분석</h3>
                <p>시각화된 의사결정 결과</p>
            </div>
        </div>
    </div>

    <script>
        // 자동 로그인 상태 확인
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // API 서비스 로드 확인
                if (typeof window.ahpApi === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'public/scripts/api-service.js';
                    document.head.appendChild(script);
                    
                    // 스크립트 로드 대기
                    await new Promise(resolve => script.onload = resolve);
                }
                
                // 로그인 상태 확인
                const result = await window.ahpApi.getCurrentUser();
                if (result.success) {
                    console.log('✅ 이미 로그인됨:', result.user.name);
                    
                    // 역할에 따른 리다이렉트
                    if (result.user.role === 'admin' || result.user.is_superuser) {
                        window.location.href = 'public/super-admin-dashboard.html';
                    } else {
                        window.location.href = 'public/personal-service-enhanced.html';
                    }
                } else {
                    console.log('🔐 로그인 필요');
                }
            } catch (error) {
                console.log('인증 확인 중 오류:', error);
            }
        });
    </script>
</body>
</html>
